{% extends 'base.html' %}
{% load static %}

{% block title %}Notifications - AI-ATTEND{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-bell-fill"></i> Notifications</h4>
    <button class="btn btn-outline-secondary btn-sm" onclick="markAllNotificationsRead()">
        <i class="bi bi-check2-all"></i> Mark all as read
    </button>
</div>

<div class="card mb-3">
    <div class="card-body py-2">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label for="typeFilter" class="form-label mb-1">Type</label>
                <select class="form-select form-select-sm" id="typeFilter" onchange="applyFilters()">
                    <option value="">All Types</option>
                    <option value="absent">Absent</option>
                    <option value="request_submitted">Request Submitted</option>
                    <option value="request_approved">Request Approved</option>
                    <option value="request_rejected">Request Rejected</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="statusFilter" class="form-label mb-1">Status</label>
                <select class="form-select form-select-sm" id="statusFilter" onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="unread">Unread</option>
                    <option value="read">Read</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="sortFilter" class="form-label mb-1">Sort</label>
                <select class="form-select form-select-sm" id="sortFilter" onchange="applyFilters()">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                </select>
            </div>
        </div>
        <div class="mt-2 small text-muted" id="filterSummary">Showing all notifications</div>
    </div>
</div>

<div id="notificationsList" class="d-grid gap-2">
    <div class="card">
        <div class="card-body text-center text-muted">
            <i class="bi bi-hourglass-split"></i> Loading notifications...
        </div>
    </div>
</div>

<div id="emptyState" class="card" style="display: none;">
    <div class="card-body text-center py-5">
        <i class="bi bi-bell-slash fs-1 text-muted"></i>
        <h6 class="mt-3 mb-1">No notifications</h6>
        <p class="text-muted mb-0">You're all caught up.</p>
    </div>
</div>

<div class="modal fade" id="notificationDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detailTitle">Notification</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="detailContent"></div>
            <div class="modal-footer" id="detailActions">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
    let allNotifications = [];
    let activeRequestId = 0;
    const currentUserRole = "{{ request.user.role }}";
    const correctionRequestsTeacherUrl = "{% url 'correction_requests_teacher' %}";
    const myCorrectionRequestsUrl = "{% url 'my_correction_requests' %}";
    const sessionDetailWithCorrectionTemplate = "{% url 'session_detail_with_correction' 0 %}";

    document.addEventListener('DOMContentLoaded', function () {
        loadAllNotifications();
    });

    async function loadAllNotifications() {
        const requestId = ++activeRequestId;
        try {
            const typeValue = document.getElementById('typeFilter')?.value || '';
            const statusValue = document.getElementById('statusFilter')?.value || '';

            const params = new URLSearchParams();
            params.set('limit', '100');
            if (typeValue) {
                params.set('type', typeValue);
            }
            if (statusValue === 'unread') {
                params.set('unread_only', 'true');
            }

            const response = await fetch(`{% url "get_notifications" %}?${params.toString()}`, {
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });

            const data = await response.json();

            if (requestId !== activeRequestId) {
                return;
            }

            if (data.success && data.notifications.length > 0) {
                allNotifications = data.notifications;
                filterNotifications();
            } else {
                allNotifications = [];
                renderNotifications([]);
            }
        } catch (error) {
            console.error('Error loading notifications:', error);
        }
    }

    function renderNotifications(notifications) {
        if (notifications.length === 0) {
            showEmptyState();
            return;
        }

        displayNotifications(notifications);
    }

    function displayNotifications(notifications) {
        const container = document.getElementById('notificationsList');
        container.innerHTML = '';
        container.style.display = 'grid';

        updateFilterSummary(notifications.length);

        notifications.forEach(notification => {
            const item = createNotificationItem(notification);
            container.appendChild(item);
        });

        document.getElementById('emptyState').style.display = 'none';
    }

    function createNotificationItem(notification) {
        const div = document.createElement('div');
        div.className = `card ${!notification.is_read ? 'border-primary' : ''}`;
        div.onclick = () => showNotificationDetail(notification);

        const icons = {
            'absent': '<i class="bi bi-person-x-fill text-danger"></i>',
            'request_submitted': '<i class="bi bi-send-fill text-warning"></i>',
            'request_approved': '<i class="bi bi-check-circle-fill text-success"></i>',
            'request_rejected': '<i class="bi bi-x-circle-fill text-secondary"></i>'
        };

        const actionHtml = getActionButtonHtml(notification);

        div.innerHTML = `
        <div class="card-body">
            <div class="d-flex gap-3 align-items-start">
                <div class="fs-4 pt-1">
                    ${icons[notification.type] || '<i class="bi bi-bell-fill text-primary"></i>'}
                </div>
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <div>
                            <h6 class="mb-1">${notification.title}</h6>
                            <p class="mb-2 text-muted">${notification.message}</p>
                            <small class="text-muted">${formatDate(notification.created_at)}</small>
                        </div>
                        ${!notification.is_read ? '<span class="badge text-bg-primary">New</span>' : ''}
                    </div>
                    ${actionHtml}
                </div>
            </div>
        </div>
    `;

        return div;
    }

    function showEmptyState() {
        const list = document.getElementById('notificationsList');
        list.style.display = 'none';
        list.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        updateFilterSummary(0);
    }

    function showNotificationDetail(notification) {
        document.getElementById('detailTitle').textContent = notification.title;
        document.getElementById('detailContent').innerHTML = `
        <div class="mb-3">
            <label class="form-label fw-semibold">Type</label>
            <p class="mb-0 text-muted">${notification.type.replace('_', ' ').toUpperCase()}</p>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Message</label>
            <p class="mb-0 text-muted">${notification.message}</p>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Date</label>
            <p class="mb-0 text-muted">${formatDate(notification.created_at)}</p>
        </div>
        ${notification.session_subject ? `
            <div class="mb-0">
                <label class="form-label fw-semibold">Subject</label>
                <p class="mb-0 text-muted">${notification.session_subject}</p>
            </div>
        ` : ''}
    `;

        const actionsContainer = document.getElementById('detailActions');
        actionsContainer.innerHTML = `
            ${getActionButtonHtml(notification, true)}
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        `;

        const detailModal = new bootstrap.Modal(document.getElementById('notificationDetailModal'));
        detailModal.show();

        if (!notification.is_read) {
            markNotificationRead(notification.id);
        }
    }

    async function markNotificationRead(notificationId) {
        try {
            const markReadUrlTemplate = "{% url 'mark_notification_read' 0 %}";
            const markReadUrl = markReadUrlTemplate.replace('/0/read/', `/${notificationId}/read/`);

            await fetch(markReadUrl, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });

            allNotifications = allNotifications.map((item) => {
                if (item.id === notificationId) {
                    return { ...item, is_read: true };
                }
                return item;
            });

            await loadAllNotifications();

            if (window.notificationManager) {
                window.notificationManager.updateNotificationBadge();
            }
        } catch (error) {
            console.error('Error marking notification as read:', error);
        }
    }

    async function markAllNotificationsRead() {
        if (!confirm('Mark all notifications as read?')) return;

        try {
            await fetch('{% url "mark_all_notifications_read" %}', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });
            await loadAllNotifications();

            if (window.notificationManager) {
                window.notificationManager.updateNotificationBadge();
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function filterNotifications() {
        const typeValue = document.getElementById('typeFilter').value;
        const statusValue = document.getElementById('statusFilter').value;
        const sortValue = document.getElementById('sortFilter').value;

        let filtered = [...allNotifications];

        if (typeValue) {
            filtered = filtered.filter((item) => item.type === typeValue);
        }

        if (statusValue === 'read') {
            filtered = filtered.filter((item) => item.is_read);
        } else if (statusValue === 'unread') {
            filtered = filtered.filter((item) => !item.is_read);
        }

        filtered.sort((a, b) => {
            const t1 = new Date(a.created_at).getTime();
            const t2 = new Date(b.created_at).getTime();
            return sortValue === 'oldest' ? t1 - t2 : t2 - t1;
        });

        renderNotifications(filtered);
    }

    async function applyFilters() {
        await loadAllNotifications();
    }

    function updateFilterSummary(count) {
        const summary = document.getElementById('filterSummary');
        if (!summary) {
            return;
        }

        const typeValue = document.getElementById('typeFilter')?.value || '';
        const statusValue = document.getElementById('statusFilter')?.value || '';
        const sortValue = document.getElementById('sortFilter')?.value || 'newest';

        const typeLabel = typeValue ? `Type: ${typeValue.replace('_', ' ')}` : 'All types';
        const statusLabel = statusValue ? `Status: ${statusValue}` : 'All statuses';
        const sortLabel = sortValue === 'oldest' ? 'Oldest first' : 'Newest first';

        summary.textContent = `Showing ${count} notification${count === 1 ? '' : 's'} · ${typeLabel} · ${statusLabel} · ${sortLabel}`;
    }

    document.addEventListener('DOMContentLoaded', function () {
        ['typeFilter', 'statusFilter', 'sortFilter'].forEach((id) => {
            const element = document.getElementById(id);
            if (element) {
                element.onchange = applyFilters;
            }
        });
    });

    function getActionButtonHtml(notification, inModal = false) {
        const className = inModal ? 'btn btn-primary me-auto' : 'btn btn-outline-primary btn-sm mt-2';

        if (notification.type === 'request_submitted' && ['teacher', 'hod'].includes(currentUserRole)) {
            return `<a href="${correctionRequestsTeacherUrl}" class="${className}"><i class="bi bi-list-check"></i> Open Correction Requests</a>`;
        }

        if (['request_submitted', 'request_approved', 'request_rejected'].includes(notification.type) && currentUserRole === 'student') {
            return `<a href="${myCorrectionRequestsUrl}" class="${className}"><i class="bi bi-journal-text"></i> Open My Requests</a>`;
        }

        if (notification.type === 'absent' && notification.session_id && currentUserRole === 'student') {
            const sessionUrl = sessionDetailWithCorrectionTemplate.replace('/0/detail/', `/${notification.session_id}/detail/`);
            return `<a href="${sessionUrl}" class="${className}"><i class="bi bi-eye"></i> View Session</a>`;
        }

        return '';
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
