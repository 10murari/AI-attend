{# Reusable filter bar — include in list pages #}
{# Required context: departments, selected_dept, selected_sem, filter_url #}

<div class="card mb-3">
    <div class="card-body py-2">
        <form method="get" class="d-flex gap-3 align-items-center flex-wrap">
            {% if show_dept_filter %}
            <select name="department" class="form-select form-select-sm" style="max-width: 220px;"
                onchange="this.form.submit()">
                <option value="">All Departments</option>
                {% for d in departments %}
                <option value="{{ d.id }}" {% if selected_dept==d.id|stringformat:"d" %}selected{% endif %}>
                    {{ d.code }} &mdash; {{ d.name }}
                </option>
                {% endfor %}
            </select>
            {% endif %}

            {% if show_sem_filter %}
            <select name="semester" class="form-select form-select-sm" style="max-width: 160px;"
                onchange="this.form.submit()">
                <option value="">All Semesters</option>
                <option value="1" {% if selected_sem=="1" %}selected{% endif %}>Semester 1</option>
                <option value="2" {% if selected_sem=="2" %}selected{% endif %}>Semester 2</option>
                <option value="3" {% if selected_sem=="3" %}selected{% endif %}>Semester 3</option>
                <option value="4" {% if selected_sem=="4" %}selected{% endif %}>Semester 4</option>
                <option value="5" {% if selected_sem=="5" %}selected{% endif %}>Semester 5</option>
                <option value="6" {% if selected_sem=="6" %}selected{% endif %}>Semester 6</option>
                <option value="7" {% if selected_sem=="7" %}selected{% endif %}>Semester 7</option>
                <option value="8" {% if selected_sem=="8" %}selected{% endif %}>Semester 8</option>
            </select>
            {% endif %}

            {% if selected_dept or selected_sem %}
            <a href="{{ filter_url }}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-x-lg"></i> Clear
            </a>
            {% endif %}
        </form>
    </div>
</div>
