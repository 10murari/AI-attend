{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AttendAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-camera-video-fill" style="font-size: 2.5rem;"></i>
                <h3>AttendAI</h3>
                <p>Face Recognition Attendance System</p>
            </div>
            <div class="login-body">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} py-2 mb-3">
                    <i class="bi bi-exclamation-circle"></i> {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username / Roll No</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            {{ form.username }}
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            {{ form.password }}
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-icon">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
